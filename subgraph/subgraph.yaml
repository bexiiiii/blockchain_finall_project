specVersion: 1.2.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: TBillToken
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: TBillToken
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Asset
        - AssetTransfer
      abis:
        - name: TBillToken
          file: ./abis/TBillToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: RegistryUpdated(indexed address,indexed address)
          handler: handleRegistryUpdated
      file: ./src/mappings.ts
  - kind: ethereum
    name: TBillVault
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: TBillVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - VaultAction
      abis:
        - name: TBillVault
          file: ./abis/TBillVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: YieldReported(indexed address,uint256)
          handler: handleYieldReported
      file: ./src/mappings.ts
  - kind: ethereum
    name: RwaStableAMM
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: RwaStableAMM
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Swap
        - LiquidityPosition
      abis:
        - name: RwaStableAMM
          file: ./abis/RwaStableAMM.json
      eventHandlers:
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: Swap(indexed address,indexed address,uint256,uint256,indexed address)
          handler: handleSwap
      file: ./src/mappings.ts
  - kind: ethereum
    name: RwaGovernor
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: RwaGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Proposal
        - VoteCast
      abis:
        - name: RwaGovernor
          file: ./abis/RwaGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,indexed address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
      file: ./src/mappings.ts
  - kind: ethereum
    name: ProtocolTreasury
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ProtocolTreasury
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TreasuryPayment
      abis:
        - name: ProtocolTreasury
          file: ./abis/ProtocolTreasury.json
      eventHandlers:
        - event: TokenPaymentScheduled(indexed address,indexed address,uint256)
          handler: handleTokenPaymentScheduled
        - event: TokenPaymentWithdrawn(indexed address,indexed address,uint256)
          handler: handleTokenPaymentWithdrawn
        - event: EthPaymentScheduled(indexed address,uint256)
          handler: handleEthPaymentScheduled
        - event: EthPaymentWithdrawn(indexed address,uint256)
          handler: handleEthPaymentWithdrawn
      file: ./src/mappings.ts
      # Base Sepolia deployment configuration
# Updated for production-style indexing flow
