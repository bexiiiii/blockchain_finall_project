[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
test = "test"
script = "script"
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
fuzz = { runs = 256 }
invariant = { runs = 32, depth = 64 }
fs_permissions = [{ access = "read-write", path = "./deployments" }, { access = "read-write", path = "./docs/reports" }]
remappings = [
  "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
  "@openzeppelin/contracts-upgradeable/=node_modules/@openzeppelin/contracts-upgradeable/",
  "forge-std/=lib/forge-std/src/"
]

[profile.ci]
fuzz = { runs = 512 }
invariant = { runs = 64, depth = 32 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"
